<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115學年 行政資料總表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; background: #F0F4F8; min-height: 100vh; }

/* ── 頂部 ── */
.topbar { background: #185FA5; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.topbar h1 { font-size: 16px; font-weight: 500; }
.topbar p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.top-right { display: flex; gap: 8px; }
.top-btn { font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4); color: #fff; background: transparent; cursor: pointer; }
.top-btn:hover { background: rgba(255,255,255,0.15); }
.top-btn.primary { background: #fff; color: #185FA5; border-color: #fff; font-weight: 500; }

/* ── 統計列 ── */
.stats-bar { display: flex; gap: 10px; padding: 14px 20px; flex-wrap: wrap; }
.stat { background: #fff; border-radius: 8px; padding: 10px 16px; flex: 1; min-width: 100px; border: 0.5px solid #e0e0e0; }
.stat-lbl { font-size: 11px; color: #888; margin-bottom: 3px; }
.stat-val { font-size: 22px; font-weight: 500; }

/* ── 總表 ── */
.table-wrap { padding: 0 20px 20px; overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 0.5px solid #e0e0e0; }
.tbl th { padding: 10px 8px; font-size: 12px; font-weight: 500; color: #fff; background: #185FA5; text-align: center; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.2); }
.tbl th:first-child { text-align: left; padding-left: 16px; min-width: 70px; border-right: 1px solid rgba(255,255,255,0.3); }
.tbl td { padding: 0; border-bottom: 0.5px solid #eee; border-right: 0.5px solid #eee; vertical-align: middle; }
.tbl td:first-child { padding: 10px 16px; font-size: 13px; font-weight: 500; color: #185FA5; background: #F0F7FF; border-right: 1px solid #ddd; white-space: nowrap; }
.tbl tr:last-child td { border-bottom: none; }

/* ── 格子 ── */
.cell { width: 100%; min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; padding: 6px 4px; transition: background 0.12s; position: relative; }
.cell:hover { filter: brightness(0.94); }
.cell.uploaded { background: #EAF3DE; }
.cell.pending { background: #FCEBEB; }
.cell.review { background: #FAEEDA; }
.cell-icon { font-size: 16px; }
.cell-label { font-size: 10px; font-weight: 500; }
.cell.uploaded .cell-label { color: #27500A; }
.cell.pending .cell-label { color: #791F1F; }
.cell.review .cell-label { color: #633806; }
.cell-count { font-size: 9px; color: #888; }

/* ── 進度欄 ── */
.prog-cell { padding: 8px 10px !important; background: #fff !important; }
.prog-bar { height: 6px; background: #eee; border-radius: 99px; overflow: hidden; margin-bottom: 3px; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
.prog-pct { font-size: 11px; font-weight: 500; text-align: center; }

/* ── Modal 遮罩 ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 16px 20px 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-title { font-size: 15px; font-weight: 500; }
.modal-sub { font-size: 12px; color: #888; margin-top: 2px; }
.modal-close { font-size: 20px; color: #888; background: none; border: none; cursor: pointer; padding: 0 4px; line-height: 1; }
.modal-body { padding: 16px 20px; }

/* ── 파일 리스트 ── */
.file-entry { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; background: #fafafa; }
.file-entry-icon { font-size: 20px; flex-shrink: 0; }
.file-entry-info { flex: 1; min-width: 0; }
.file-entry-name { font-size: 13px; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-entry-meta { font-size: 11px; color: #888; margin-top: 2px; }
.file-entry-actions { display: flex; gap: 6px; flex-shrink: 0; }
.fa-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #ddd; background: #fff; color: #444; cursor: pointer; text-decoration: none; white-space: nowrap; }
.fa-btn:hover { background: #f0f0f0; }
.fa-btn.blue { border-color: #185FA5; color: #185FA5; }
.no-file { text-align: center; padding: 24px; color: #aaa; font-size: 13px; }

/* ── 上傳區 ── */
.upload-zone { border: 2px dashed #B5D4F4; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; position: relative; margin-top: 12px; }
.upload-zone:hover { background: #EBF4FD; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-zone-main { font-size: 13px; color: #185FA5; font-weight: 500; margin-top: 6px; }
.upload-zone-sub { font-size: 11px; color: #aaa; margin-top: 3px; }
.queued-files { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
.qf { display: flex; align-items: center; gap: 8px; font-size: 12px; background: #E6F1FB; border-radius: 6px; padding: 6px 10px; }
.qf-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #0C447C; }
.qf-rm { background: none; border: none; color: #A32D2D; cursor: pointer; font-size: 14px; }

.upload-btn { width: 100%; margin-top: 12px; padding: 11px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.upload-btn:hover { background: #0C447C; }
.upload-btn:disabled { background: #aaa; cursor: not-allowed; }
.prog-row { margin-top: 10px; }
.prog-bar2 { height: 7px; background: #eee; border-radius: 99px; overflow: hidden; }
.prog-fill2 { height: 100%; background: #185FA5; border-radius: 99px; width: 0; transition: width 0.3s; }
.prog-txt2 { font-size: 11px; color: #666; margin-top: 5px; text-align: center; }
.result-msg { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
.result-msg.ok { background: #EAF3DE; border: 1px solid #97C459; color: #27500A; }
.result-msg.err { background: #FCEBEB; border: 1px solid #F09595; color: #791F1F; }

/* ── Script URL 設定列 ── */
.settings-bar { padding: 10px 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.settings-bar label { font-size: 12px; color: #555; white-space: nowrap; }
.settings-bar input { flex: 1; min-width: 200px; font-size: 12px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; }
.settings-bar input:focus { outline: none; border-color: #185FA5; }
.save-btn { font-size: 12px; padding: 6px 14px; background: #185FA5; color: #fff; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }

.legend { display: flex; gap: 14px; padding: 8px 20px 0; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>📂 115學年 學校行政資料總表</h1>
    <p>物理治療科教學組 · 點格子可查看/上傳檔案</p>
  </div>
  <div class="top-right">
    <button class="top-btn" onclick="syncAll()">🔄 同步狀態</button>
    <button class="top-btn primary" onclick="document.getElementById('scriptUrlInput').focus()">⚙ 設定網址</button>
  </div>
</div>

<div class="settings-bar">
  <label>Apps Script 網址：</label>
  <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/YOUR_ID/exec" value="">
  <button class="save-btn" onclick="saveScriptUrl()">儲存</button>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-lbl">合作學校</div><div class="stat-val" style="color:#185FA5" id="st-schools">10</div></div>
  <div class="stat"><div class="stat-lbl">文件格數</div><div class="stat-val" style="color:#444" id="st-total">70</div></div>
  <div class="stat"><div class="stat-lbl">已上傳</div><div class="stat-val" style="color:#3B6D11" id="st-up">0</div></div>
  <div class="stat"><div class="stat-lbl">待上傳</div><div class="stat-val" style="color:#A32D2D" id="st-pend">70</div></div>
  <div class="stat"><div class="stat-lbl">整體完成</div><div class="stat-val" style="color:#854F0B" id="st-pct">0%</div></div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#EAF3DE;border:1px solid #97C459"></div>已上傳</div>
  <div class="leg"><div class="leg-dot" style="background:#FCEBEB;border:1px solid #F09595"></div>待上傳</div>
  <div class="leg"><div class="leg-dot" style="background:#FAEEDA;border:1px solid #FAC775"></div>審核中</div>
</div>

<div class="table-wrap" style="margin-top:12px;">
  <table class="tbl" id="mainTable">
    <thead id="tblHead"></thead>
    <tbody id="tblBody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const SCHOOLS = ['高醫','中山','慈濟','亞大','義守','弘光','輔英','慈惠','樹人','仁德'];
const CATEGORIES = ['實習合約','實習名單','實習手冊','實習費用','學校座談會','實習成績寄發','其它'];
const CAT_ICONS = { '實習合約':'📄','實習名單':'👥','實習手冊':'📘','實習費用':'💰','學校座談會':'🗣️','實習成績寄發':'📮','其它':'📁' };

// 狀態資料（格式：status, files[]）
let data = {};
let queuedFiles = [];
let currentCell = null;
let scriptUrl = localStorage.getItem('scriptUrl') || '';

// 初始化資料
SCHOOLS.forEach(s => {
  data[s] = {};
  CATEGORIES.forEach(c => { data[s][c] = { status: 'pending', files: [] }; });
});

// 載入已儲存的狀態
function loadData() {
  const saved = localStorage.getItem('pt115data');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      SCHOOLS.forEach(s => {
        CATEGORIES.forEach(c => {
          if (parsed[s] && parsed[s][c]) data[s][c] = parsed[s][c];
        });
      });
    } catch(e) {}
  }
  if (scriptUrl) document.getElementById('scriptUrlInput').value = scriptUrl;
}

function saveData() {
  localStorage.setItem('pt115data', JSON.stringify(data));
}

function saveScriptUrl() {
  scriptUrl = document.getElementById('scriptUrlInput').value.trim();
  localStorage.setItem('scriptUrl', scriptUrl);
  alert('✅ 網址已儲存！');
}

// 建立表格
function renderTable() {
  // 標題列
  const head = document.getElementById('tblHead');
  head.innerHTML = '<tr><th>學校</th>' + CATEGORIES.map(c => `<th>${CAT_ICONS[c]}<br>${c}</th>`).join('') + '<th>進度</th></tr>';

  // 資料列
  const body = document.getElementById('tblBody');
  body.innerHTML = '';
  SCHOOLS.forEach(school => {
    const tr = document.createElement('tr');
    let uploadedCount = 0;

    let html = `<td>${school}</td>`;
    CATEGORIES.forEach(cat => {
      const cell = data[school][cat];
      const statusClass = cell.status === 'uploaded' ? 'uploaded' : cell.status === 'review' ? 'review' : 'pending';
      const statusLabel = cell.status === 'uploaded' ? '已上傳' : cell.status === 'review' ? '審核中' : '待上傳';
      const fileCount = cell.files.length;
      if (cell.status === 'uploaded') uploadedCount++;

      html += `<td><div class="cell ${statusClass}" onclick="openCell('${school}','${cat}')">
        <span class="cell-icon">${CAT_ICONS[cat]}</span>
        <span class="cell-label">${statusLabel}</span>
        ${fileCount > 0 ? `<span class="cell-count">${fileCount}個檔案</span>` : ''}
      </div></td>`;
    });

    // 進度欄
    const pct = Math.round(uploadedCount / CATEGORIES.length * 100);
    const fillColor = pct === 100 ? '#639922' : pct >= 50 ? '#BA7517' : '#A32D2D';
    html += `<td class="prog-cell">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="prog-pct" style="color:${fillColor}">${pct}%</div>
    </td>`;

    tr.innerHTML = html;
    body.appendChild(tr);
  });

  updateStats();
}

function updateStats() {
  let up = 0, pend = 0;
  const total = SCHOOLS.length * CATEGORIES.length;
  SCHOOLS.forEach(s => CATEGORIES.forEach(c => {
    if (data[s][c].status === 'uploaded') up++;
    else pend++;
  }));
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-up').textContent = up;
  document.getElementById('st-pend').textContent = pend;
  document.getElementById('st-pct').textContent = Math.round(up / total * 100) + '%';
}

// 開啟格子 Modal
function openCell(school, cat) {
  currentCell = { school, cat };
  queuedFiles = [];
  document.getElementById('modalTitle').textContent = `${school} ／ ${cat}`;
  document.getElementById('modalSub').textContent = '查看已上傳檔案，或上傳新文件';
  renderModalBody();
  document.getElementById('overlay').classList.add('open');
}

function renderModalBody() {
  const { school, cat } = currentCell;
  const cell = data[school][cat];
  const body = document.getElementById('modalBody');

  // 已有檔案
  let fileListHtml = '';
  if (cell.files.length > 0) {
    fileListHtml = cell.files.map((f, i) => `
      <div class="file-entry">
        <span class="file-entry-icon">${getIcon(f.name)}</span>
        <div class="file-entry-info">
          <div class="file-entry-name">${f.name}</div>
          <div class="file-entry-meta">${f.date} · ${f.size}</div>
        </div>
        <div class="file-entry-actions">
          ${f.url ? `<a class="fa-btn blue" href="${f.url}" target="_blank">開啟</a>` : ''}
          <button class="fa-btn" onclick="removeFileEntry(${i})">刪除</button>
        </div>
      </div>
    `).join('');
  } else {
    fileListHtml = '<div class="no-file">尚無檔案，請上傳</div>';
  }

  // 排隊中的檔案
  const queuedHtml = queuedFiles.length > 0 ? `
    <div class="queued-files">${queuedFiles.map((f,i) => `
      <div class="qf">
        <span>${getIcon(f.name)}</span>
        <span class="qf-name">${f.name}</span>
        <span style="font-size:11px;color:#666;flex-shrink:0;">${formatSize(f.size)}</span>
        <button class="qf-rm" onclick="removeQueued(${i})">✕</button>
      </div>
    `).join('')}</div>
  ` : '';

  body.innerHTML = `
    ${fileListHtml}
    <div class="upload-zone">
      <input type="file" multiple onchange="addQueued(this.files)">
      <div style="font-size:28px;">📎</div>
      <div class="upload-zone-main">點擊或拖曳新增檔案</div>
      <div class="upload-zone-sub">PDF、Word、Excel、圖片，最大 50 MB</div>
    </div>
    ${queuedHtml}
    ${queuedFiles.length > 0 ? `
      <button class="upload-btn" id="uploadBtn" onclick="doUpload()">上傳 ${queuedFiles.length} 個檔案至 Google Drive</button>
    ` : ''}
    <div class="prog-row" id="progRow" style="display:none">
      <div class="prog-bar2"><div class="prog-fill2" id="progFill2"></div></div>
      <div class="prog-txt2" id="progTxt2"></div>
    </div>
    <div id="resultMsg"></div>
  `;
}

function addQueued(fileList) {
  Array.from(fileList).forEach(f => {
    if (!queuedFiles.find(x => x.name === f.name && x.size === f.size)) {
      queuedFiles.push(f);
    }
  });
  renderModalBody();
}

function removeQueued(i) { queuedFiles.splice(i, 1); renderModalBody(); }

function removeFileEntry(i) {
  const { school, cat } = currentCell;
  data[school][cat].files.splice(i, 1);
  if (data[school][cat].files.length === 0) data[school][cat].status = 'pending';
  saveData(); renderTable(); renderModalBody();
}

async function doUpload() {
  if (!scriptUrl) {
    showResult('err', '❌ 請先填入 Apps Script 網址（頁面上方設定列）');
    return;
  }
  if (queuedFiles.length === 0) return;

  document.getElementById('uploadBtn').disabled = true;
  const { school, cat } = currentCell;

  for (let i = 0; i < queuedFiles.length; i++) {
    const file = queuedFiles[i];
    setProgress(Math.round(i / queuedFiles.length * 100), `上傳中 ${i+1}/${queuedFiles.length}：${file.name}`);

    try {
      const base64 = await toBase64(file);
      const res = await fetch(scriptUrl, {
        method: 'POST',
        body: JSON.stringify({
          school, category: cat,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          fileData: base64, note: ''
        })
      });
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message);

      // 更新本地狀態
      data[school][cat].files.push({
        name: file.name,
        size: formatSize(file.size),
        date: new Date().toLocaleDateString('zh-TW'),
        url: json.fileUrl || ''
      });
      data[school][cat].status = 'uploaded';

    } catch(err) {
      setProgress(0, '');
      showResult('err', `❌ 上傳失敗：${err.message}`);
      document.getElementById('uploadBtn').disabled = false;
      return;
    }
  }

  setProgress(100, '完成！');
  saveData();
  renderTable();
  queuedFiles = [];
  setTimeout(() => {
    showResult('ok', `✅ 成功上傳 ${data[school][cat].files.length} 個檔案！試算表狀態已更新。`);
    renderModalBody();
  }, 400);
}

function setProgress(pct, txt) {
  document.getElementById('progRow').style.display = 'block';
  document.getElementById('progFill2').style.width = pct + '%';
  document.getElementById('progTxt2').textContent = txt;
}

function showResult(type, msg) {
  const el = document.getElementById('resultMsg');
  el.className = 'result-msg ' + type;
  el.textContent = msg;
}

function syncAll() {
  if (!scriptUrl) { alert('請先填入 Apps Script 網址'); return; }
  alert('同步功能需透過 Apps Script 執行 syncDriveToSheet()，請至 Apps Script 手動執行或設定每日自動觸發。');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }
function closeModal(e) { if (e.target === document.getElementById('overlay')) closeOverlay(); }

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function getIcon(name) {
  const ext = (name.split('.').pop() || '').toUpperCase();
  if (ext === 'PDF') return '📄';
  if (['DOC','DOCX'].includes(ext)) return '📝';
  if (['XLS','XLSX'].includes(ext)) return '📊';
  if (['JPG','JPEG','PNG'].includes(ext)) return '🖼️';
  return '📁';
}

function formatSize(bytes) {
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

loadData();
renderTable();
</script>
</body>
</html>
